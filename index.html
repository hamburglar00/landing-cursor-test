<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="container background-image" id="background">
      <div class="overlay"></div>
      <div class="content">
        <img
          id="logo"
          src=""
          class="logo"
          width="250"
          height="250"
          alt=""
          decoding="async"
          fetchpriority="high"
        />

        <p class="title" id="title">Cargando landing...</p>

        <a
          class="whatsapp-button"
          id="whatsappButton"
          href="#"
          aria-label="Contactar por WhatsApp"
        >
          <span id="ctaText">Contactar</span>
          <img
            src="imagenes/whatsapp.png"
            alt="whatsapp"
            class="whatsapp-icon"
            width="30"
            height="30"
            decoding="async"
          />
        </a>

        <p class="subtitle" id="subtitle"></p>
        <p class="description" id="badge"></p>
      </div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
